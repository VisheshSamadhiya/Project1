<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Landing Page</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h2>🚀 My Website</h2>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>

    <button onclick="toggleTheme()">
        🌙
    </button>

</header>

<section class="hero">

    <h1>Welcome to My Website</h1>

    <p>
        Beautiful HTML • CSS • JavaScript Demo
    </p>

    <button onclick="showMessage()">
        Explore
    </button>

</section>

<section class="cards">

    <div class="card">
        <h2>⚡ Fast</h2>
        <p>Modern responsive design.</p>
    </div>

    <div class="card">
        <h2>🎨 Stylish</h2>
        <p>Clean UI with animations.</p>
    </div>

    <div class="card">
        <h2>🔒 Secure</h2>
        <p>Built with best practices.</p>
    </div>

</section>

<section class="counter">

    <h2>Visitors</h2>

    <h1 id="count">0</h1>

</section>

<section class="clock">

    <h2>Current Time</h2>

    <h1 id="clock"></h1>

</section>

<footer>

    © 2026 Vishesh | Demo Website

</footer>

<script src="app.js"></script>

</body>
</html>
